services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-qa_internship}
      POSTGRES_USER: ${POSTGRES_USER:-qa_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qa_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-qa_user} -d ${POSTGRES_DB:-qa_internship}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-qa_user}:${POSTGRES_PASSWORD:-qa_password}@postgres:5432/${POSTGRES_DB:-qa_internship}?schema=public
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:-change-me-admin-session-secret}
      INTERN_SESSION_SECRET: ${INTERN_SESSION_SECRET:-change-me-intern-session-secret}
      INVITATION_TOKEN_ENCRYPTION_SECRET: ${INVITATION_TOKEN_ENCRYPTION_SECRET:-change-me-invitation-token-secret}
    ports:
      - "${APP_PORT:-3000}:3000"

volumes:
  postgres-data:
